<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Post</title>
</head>
<body>

<h1>Welcome!</h1>

<form method="POST" th:action="@{/blog/new}" th:object="${post}">
    <div>
        <label for="title">Titolo:</label>
        <input type="text" id="title" th:field="*{title}" placeholder="Inserisci il titolo" required/>
        <span class="validationError"
              th:if="${#fields.hasErrors('title')}"
              th:errors="${post.title}">Name Error
    </span>
    </div>
    <div>
        <label for="publisheddate">Data di pubblicazione:</label>
        <input type="date" id="publisheddate" th:field="*{publisheddate}" placeholder="Inserisci la Data di pubblicazione" required/>
        <span class="validationError"
              th:if="${#fields.hasErrors('publisheddate')}"
              th:errors="${post.publisheddate}">Publisheddate Error
    </span>
    </div>
    <div>
        <label for="category">Categoria:</label>
        <input type="text" id="category" th:field="*{category}" placeholder="Inserisci la categoria" required/>
        <span class="validationError"
              th:if="${#fields.hasErrors('category')}"
              th:errors="${post.category}">Category Error
    </span>
    </div>
    <div>
        <label for="author">Autore:</label>
        <input type="text" id="author" th:field="*{author}" placeholder="Inserisci l'autore" required/>
        <span class="validationError"
              th:if="${#fields.hasErrors('author')}"
              th:errors="${post.author}">Author Error
    </span>
    </div>
    <div>
        <label for="content">Contenuto:</label>
        <textarea id="content" th:field="*{content}" placeholder="Inserisci il Contenuto"></textarea>
        <span class="validationError"
              th:if="${#fields.hasErrors('content')}"
              th:errors="${post.content}">Content Error
    </span>
    </div>

    <div>
        <button type="submit">Salva Post</button>
    </div>
</form>

<form method="get" th:action="@{/blog}">
    <input type="submit" value="lista">
</form>

</body>
</html>
